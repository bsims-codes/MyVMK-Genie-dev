<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyVMK Genie - Event Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
    }
    .header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .header p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    /* Loading/Error states */
    .loading, .error, .empty {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.6);
    }
    .error { color: #ef4444; }

    /* Event Cards */
    .events-section {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 18px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title.upcoming { color: #10b981; }
    .section-title.past { color: rgba(255,255,255,0.4); }

    .event-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .event-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(139, 92, 246, 0.3);
    }
    .event-card.past {
      opacity: 0.5;
    }
    .event-card.active {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .event-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .event-type {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
    }
    .event-type.community {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .event-details {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    .event-detail {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .effects-list {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .effect-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
    .footer a {
      color: #ec4899;
      text-decoration: none;
    }

    /* Refresh button */
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
      transition: transform 0.2s;
    }
    .refresh-btn:hover {
      transform: scale(1.1);
    }
    .refresh-btn.spinning {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MyVMK Genie Events</h1>
      <p>Upcoming events and happenings in MyVMK</p>
    </div>

    <div id="events-container">
      <div class="loading">Loading events...</div>
    </div>

    <div class="footer">
      Powered by <a href="https://github.com/bsims-codes/MyVMK-Genie" target="_blank">MyVMK Genie</a>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadEvents()" title="Refresh">↻</button>

  <script>
    const BIN_ID = '69b4de67aa77b81da9e28bfe';
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

    const EFFECT_ICONS = {
      fireworks: '🎆',
      rain: '🌧️',
      snow: '❄️',
      money: '💵',
      emoji: '🎉',
      night: '🌙',
      stars: '✨',
      tinkerbell: '🧚',
      butterflies: '🦋',
      spotlight: '🔦'
    };

    async function loadEvents() {
      const container = document.getElementById('events-container');
      const btn = document.querySelector('.refresh-btn');

      btn.classList.add('spinning');

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Failed to fetch');

        const data = await response.json();
        const record = data.record || data;

        const genieEvents = record.genieEvents || [];
        const communityEvents = record.communityEvents || [];

        // Combine and sort all events
        const allEvents = [
          ...genieEvents.map(e => ({ ...e, type: 'genie' })),
          ...communityEvents.map(e => ({ ...e, type: 'community' }))
        ].sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

        if (allEvents.length === 0) {
          container.innerHTML = '<div class="empty">No events scheduled</div>';
          return;
        }

        const now = new Date();
        const upcoming = allEvents.filter(e => {
          const endTime = new Date(new Date(e.startTime).getTime() + (e.durationMinutes || 5) * 60 * 1000);
          return endTime > now;
        });
        const past = allEvents.filter(e => {
          const endTime = new Date(new Date(e.startTime).getTime() + (e.durationMinutes || 5) * 60 * 1000);
          return endTime <= now;
        }).reverse().slice(0, 5); // Only show last 5 past events

        let html = '';

        if (upcoming.length > 0) {
          html += `
            <div class="events-section">
              <h2 class="section-title upcoming">📅 Upcoming Events</h2>
              ${upcoming.map(e => renderEvent(e, now)).join('')}
            </div>
          `;
        }

        if (past.length > 0) {
          html += `
            <div class="events-section">
              <h2 class="section-title past">📜 Recent Events</h2>
              ${past.map(e => renderEvent(e, now, true)).join('')}
            </div>
          `;
        }

        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load events. Please try again.</div>`;
        console.error(err);
      } finally {
        btn.classList.remove('spinning');
      }
    }

    function renderEvent(event, now, isPast = false) {
      const startTime = new Date(event.startTime);
      const endTime = new Date(startTime.getTime() + (event.durationMinutes || 5) * 60 * 1000);
      const isActive = now >= startTime && now <= endTime;

      const dateStr = startTime.toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });
      const timeStr = startTime.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });

      const effects = event.effects || [];
      const effectsHtml = effects.length > 0 ? `
        <div class="effects-list">
          ${effects.map(e => `<span class="effect-tag">${EFFECT_ICONS[e] || '✨'} ${e}</span>`).join('')}
        </div>
      ` : '';

      // Support both 'title' and 'name' fields for event title
      const eventTitle = event.title || event.name || 'Untitled Event';

      return `
        <div class="event-card ${isPast ? 'past' : ''} ${isActive ? 'active' : ''}">
          <div class="event-header">
            <div class="event-title">
              ${event.type === 'genie' ? '🧞' : '👥'} ${eventTitle}
              ${isActive ? '<span class="live-badge">LIVE</span>' : ''}
            </div>
            <span class="event-type ${event.type}">${event.type === 'genie' ? 'Genie Event' : 'Community'}</span>
          </div>
          <div class="event-details">
            <span class="event-detail">📆 ${dateStr}</span>
            <span class="event-detail">🕐 ${timeStr}</span>
            <span class="event-detail">⏱️ ${event.durationMinutes || 5} min</span>
            ${event.roomName ? `<span class="event-detail">📍 ${event.roomName}</span>` : ''}
          </div>
          ${effectsHtml}
        </div>
      `;
    }

    // Load events on page load
    loadEvents();

    // Auto-refresh every 2 minutes
    setInterval(loadEvents, 120000);
  </script>
</body>
</html>
