<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyVMK Genie - Event Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
    }
    .header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .header p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    /* Loading/Error states */
    .loading, .error, .empty {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.6);
    }
    .error { color: #ef4444; }

    /* Event Cards */
    .events-section {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 18px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title.upcoming { color: #10b981; }
    .section-title.past { color: rgba(255,255,255,0.4); }

    .event-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .event-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(139, 92, 246, 0.3);
    }
    .event-card.past {
      opacity: 0.5;
    }
    .event-card.active {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .event-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .event-type {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      white-space: nowrap;
    }
    .event-type.community {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }
    .event-type.host {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }
    .event-type.double-credits {
      background: rgba(251, 191, 36, 0.2);
      color: #fcd34d;
    }

    .event-description {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin: 10px 0;
      line-height: 1.5;
    }

    .event-details {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    .event-detail {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .effects-list {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .effect-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
    .footer a {
      color: #ec4899;
      text-decoration: none;
    }

    /* Refresh button */
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
      transition: transform 0.2s;
    }
    .refresh-btn:hover {
      transform: scale(1.1);
    }
    .refresh-btn.spinning {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MyVMK Genie Events</h1>
      <p>Upcoming events and happenings in MyVMK</p>
    </div>

    <div id="events-container">
      <div class="loading">Loading events...</div>
    </div>

    <div class="footer">
      Powered by <a href="https://github.com/bsims-codes/MyVMK-Genie" target="_blank">MyVMK Genie</a>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadEvents()" title="Refresh">↻</button>

  <script>
    const BIN_ID = '69b4de67aa77b81da9e28bfe';
    const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
    const ICS_URL = 'https://bsims-codes.github.io/myvmk-ics/myvmk.ics';

    const EFFECT_ICONS = {
      fireworks: '🎆',
      rain: '🌧️',
      snow: '❄️',
      money: '💵',
      emoji: '🎉',
      night: '🌙',
      stars: '✨',
      tinkerbell: '🧚',
      butterflies: '🦋',
      spotlight: '🔦',
      happilyEverAfter: '🏰'
    };

    const TYPE_ICONS = {
      host: 'genie-host-events.png',
      genie: 'genie-genie-events.png',
      community: 'genie-community-events.png',
      'double-credits': 'genie-double-credits.png'
    };

    // Parse ICS file to extract events
    function parseICS(icsText) {
      const events = [];
      const lines = icsText.split('\n').map(l => l.trim());
      let currentEvent = null;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line === 'BEGIN:VEVENT') {
          currentEvent = {};
        } else if (line === 'END:VEVENT' && currentEvent) {
          if (currentEvent.startTime) {
            events.push(currentEvent);
          }
          currentEvent = null;
        } else if (currentEvent) {
          if (line.startsWith('SUMMARY:')) {
            currentEvent.title = line.substring(8);
          } else if (line.startsWith('DTSTART')) {
            // Handle both DTSTART:... and DTSTART;TZID=...:...
            const colonIndex = line.indexOf(':');
            if (colonIndex !== -1) {
              const dtStr = line.substring(colonIndex + 1);
              currentEvent.startTime = parseICSDate(dtStr);
            }
          } else if (line.startsWith('DTEND')) {
            // Handle both DTEND:... and DTEND;TZID=...:...
            const colonIndex = line.indexOf(':');
            if (colonIndex !== -1) {
              const dtStr = line.substring(colonIndex + 1);
              currentEvent.endTime = parseICSDate(dtStr);
            }
          } else if (line.startsWith('LOCATION:')) {
            currentEvent.roomName = line.substring(9);
          } else if (line.startsWith('DESCRIPTION:')) {
            currentEvent.description = line.substring(12).replace(/\\n/g, '\n').replace(/\\,/g, ',');
          }
        }
      }

      // Calculate duration from start/end times
      events.forEach(e => {
        if (e.startTime && e.endTime) {
          e.durationMinutes = Math.round((new Date(e.endTime) - new Date(e.startTime)) / 60000);
        } else {
          e.durationMinutes = 60; // Default 1 hour for host events
        }
      });

      return events;
    }

    function parseICSDate(dtStr) {
      // Format: 20250316T210000Z or 20250316T210000
      const year = parseInt(dtStr.substring(0, 4));
      const month = parseInt(dtStr.substring(4, 6)) - 1;
      const day = parseInt(dtStr.substring(6, 8));
      const hour = parseInt(dtStr.substring(9, 11)) || 0;
      const minute = parseInt(dtStr.substring(11, 13)) || 0;
      const second = parseInt(dtStr.substring(13, 15)) || 0;

      if (dtStr.endsWith('Z')) {
        return new Date(Date.UTC(year, month, day, hour, minute, second)).toISOString();
      } else {
        return new Date(year, month, day, hour, minute, second).toISOString();
      }
    }

    async function loadEvents() {
      const container = document.getElementById('events-container');
      const btn = document.querySelector('.refresh-btn');
      btn.classList.add('spinning');

      const allEvents = [];
      const now = new Date();

      try {
        // Fetch JSONBin events (Genie + Community)
        const jsonResponse = await fetch(JSONBIN_URL);
        if (jsonResponse.ok) {
          const data = await jsonResponse.json();
          const record = data.record || data;

          const genieEvents = (record.genieEvents || []).filter(e => e.enabled !== false);
          const communityEvents = (record.communityEvents || []).filter(e => e.enabled !== false);

          genieEvents.forEach(e => {
            allEvents.push({ ...e, type: 'genie' });
          });

          communityEvents.forEach(e => {
            allEvents.push({ ...e, type: 'community' });
          });
        }
      } catch (err) {
        console.error('Failed to fetch JSONBin events:', err);
      }

      try {
        // Fetch ICS events (Host events)
        const icsResponse = await fetch(ICS_URL + '?t=' + Date.now());
        if (icsResponse.ok) {
          const icsText = await icsResponse.text();
          const hostEvents = parseICS(icsText);

          hostEvents.forEach(e => {
            // Check if it's a Double Credits event
            const isDoubleCredits = e.title && e.title.toLowerCase().includes('double credits');
            allEvents.push({
              ...e,
              type: isDoubleCredits ? 'double-credits' : 'host'
            });
          });
        }
      } catch (err) {
        console.error('Failed to fetch ICS events:', err);
      }

      // Sort by start time
      allEvents.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

      if (allEvents.length === 0) {
        container.innerHTML = '<div class="empty">No events scheduled</div>';
        btn.classList.remove('spinning');
        return;
      }

      // Helper to check if date is today/tomorrow
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);
      const dayAfterTomorrow = new Date(tomorrow.getTime() + 24 * 60 * 60 * 1000);

      const isToday = (date) => date >= today && date < tomorrow;
      const isTomorrow = (date) => date >= tomorrow && date < dayAfterTomorrow;

      // Filter and categorize upcoming events
      const upcoming = allEvents.filter(e => {
        const endTime = new Date(new Date(e.startTime).getTime() + (e.durationMinutes || 5) * 60 * 1000);
        return endTime > now;
      });

      const todayEvents = upcoming.filter(e => isToday(new Date(e.startTime)));
      const tomorrowEvents = upcoming.filter(e => isTomorrow(new Date(e.startTime)));
      const laterEvents = upcoming.filter(e => {
        const startDate = new Date(e.startTime);
        return startDate >= dayAfterTomorrow;
      });

      const past = allEvents.filter(e => {
        const endTime = new Date(new Date(e.startTime).getTime() + (e.durationMinutes || 5) * 60 * 1000);
        return endTime <= now;
      }).reverse().slice(0, 5);

      let html = '';

      if (todayEvents.length > 0) {
        html += `
          <div class="events-section">
            <h2 class="section-title upcoming">📅 Today</h2>
            ${todayEvents.map(e => renderEvent(e, now)).join('')}
          </div>
        `;
      }

      if (tomorrowEvents.length > 0) {
        html += `
          <div class="events-section">
            <h2 class="section-title upcoming">📆 Tomorrow</h2>
            ${tomorrowEvents.map(e => renderEvent(e, now)).join('')}
          </div>
        `;
      }

      if (laterEvents.length > 0) {
        html += `
          <div class="events-section">
            <h2 class="section-title upcoming">🗓️ Later</h2>
            ${laterEvents.map(e => renderEvent(e, now)).join('')}
          </div>
        `;
      }

      if (past.length > 0) {
        html += `
          <div class="events-section">
            <h2 class="section-title past">📜 Recent</h2>
            ${past.map(e => renderEvent(e, now, true)).join('')}
          </div>
        `;
      }

      if (html === '') {
        html = '<div class="empty">No events scheduled</div>';
      }

      container.innerHTML = html;
      btn.classList.remove('spinning');
    }

    function renderEvent(event, now, isPast = false) {
      const startTime = new Date(event.startTime);
      const endTime = new Date(startTime.getTime() + (event.durationMinutes || 5) * 60 * 1000);

      // Double Credits events are LIVE for the entire duration (typically 24 hours)
      const isDoubleCredits = event.type === 'double-credits';
      const isActive = isDoubleCredits
        ? (now >= startTime && now <= endTime)  // Full duration for double credits
        : (now >= startTime && now <= endTime); // Normal check for other events

      const dateStr = startTime.toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });
      const timeStr = startTime.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });

      // Effects
      const effects = event.effects || [];
      const effectsHtml = effects.length > 0 ? `
        <div class="effects-list">
          ${effects.map(e => `<span class="effect-tag">${EFFECT_ICONS[e] || '✨'} ${e}</span>`).join('')}
        </div>
      ` : '';

      // Title and description
      const eventTitle = event.title || event.name || 'Untitled Event';
      const description = event.description ? `<div class="event-description">${escapeHtml(event.description)}</div>` : '';

      // Type label
      let typeLabel, typeClass;
      switch (event.type) {
        case 'genie':
          typeLabel = 'Genie Event';
          typeClass = 'genie';
          break;
        case 'community':
          typeLabel = 'Community';
          typeClass = 'community';
          break;
        case 'double-credits':
          typeLabel = 'Double Credits';
          typeClass = 'double-credits';
          break;
        default:
          typeLabel = 'Host Event';
          typeClass = 'host';
      }

      const iconSrc = TYPE_ICONS[event.type] || TYPE_ICONS.host;

      return `
        <div class="event-card ${isPast ? 'past' : ''} ${isActive ? 'active' : ''}">
          <div class="event-header">
            <div class="event-title">
              <img src="${iconSrc}" alt="" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 6px;">
              ${escapeHtml(eventTitle)}
              ${isActive ? '<span class="live-badge">LIVE</span>' : ''}
            </div>
            <span class="event-type ${typeClass}">${typeLabel}</span>
          </div>
          ${description}
          <div class="event-details">
            <span class="event-detail">📆 ${dateStr}</span>
            <span class="event-detail">🕐 ${timeStr}</span>
            <span class="event-detail">⏱️ ${event.durationMinutes || 5} min</span>
            ${event.roomName ? `<span class="event-detail">📍 ${escapeHtml(event.roomName)}</span>` : ''}
          </div>
          ${effectsHtml}
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load events on page load
    loadEvents();

    // Auto-refresh every 2 minutes
    setInterval(loadEvents, 120000);
  </script>
</body>
</html>
