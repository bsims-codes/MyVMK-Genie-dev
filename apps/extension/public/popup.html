<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #581c87 50%, #1e1b4b 100%);
      color: white;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .section-title {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .phrases-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .phrase-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phrase-key {
      width: 28px;
      height: 28px;
      background: rgba(139, 92, 246, 0.3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #c4b5fd;
      flex-shrink: 0;
    }

    .phrase-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 12px;
    }

    .phrase-input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .phrase-input:focus {
      outline: none;
      border-color: #8b5cf6;
      background: rgba(255,255,255,0.08);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      font-size: 11px;
      color: #10b981;
      margin-top: 8px;
      min-height: 16px;
    }

    .help {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
    }

    .help strong {
      color: rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎮</div>
      <div>
        <div class="title">MyVMK Genie</div>
        <div class="subtitle">Quick Phrases</div>
      </div>
    </div>

    <div class="section-title">
      <span>Alt + key to send phrase in game</span>
    </div>

    <div class="phrases-list" id="phrases-list">
      <!-- Generated by JS -->
    </div>

    <button class="btn btn-primary" id="save-btn">Save Phrases</button>
    <div class="status" id="status"></div>

    <div class="help">
      <strong>How to use:</strong><br>
      1. Set your phrases above<br>
      2. Open the MyVMK game client<br>
      3. Click in the chat box<br>
      4. Press <strong>Alt+1</strong> (copies phrase)<br>
      5. Press <strong>Ctrl+V</strong> then <strong>Enter</strong>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
